name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "staging" ]

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Permissão mvnw
        run: chmod +x mvnw

      - name: Build do projeto
        run: ./mvnw clean package

      - name: Rodar testes
        run: ./mvnw test

      - name: Build da imagem Docker
        run: docker build -t crud-oracle-app .

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Simular deploy STAGING
        run: |
          echo "================================="
          echo "DEPLOY EM STAGING REALIZADO"
          echo "================================="

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Simular deploy PRODUÇÃO
        run: |
          echo "================================="
          echo "DEPLOY EM PRODUÇÃO REALIZADO"
          echo "================================="
services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-free
    environment:
      ORACLE_PASSWORD: Oracle123
      APP_USER: appuser
      APP_USER_PASSWORD: apppass
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'SELECT 1 FROM DUAL;' | sqlplus appuser/apppass@localhost:1521/FREEPDB1"]
      interval: 10s
      timeout: 10s
      retries: 10

  app:
    build: .
    container_name: crud-oracle-api
    ports:
      - "8080:8080"
    depends_on:
      oracle:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - app_network

volumes:
  oracle_data:

networks:
  app_network: